name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: rtb-linux-x64
          - os: ubuntu-24.04-arm
            target: node18-linux-arm64
            artifact: rtb-linux-arm64
          - os: macos-13
            target: node18-macos-x64
            artifact: rtb-darwin-x64
          - os: macos-14
            target: node18-macos-arm64
            artifact: rtb-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build binary
        run: npx pkg . --target ${{ matrix.target }} --output release/rtb --compress GZip

      - name: Package
        run: |
          cd release
          tar czf ${{ matrix.artifact }}.tar.gz rtb
          ls -lh ${{ matrix.artifact }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RTB ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*.tar.gz
