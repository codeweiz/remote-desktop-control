name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # ── 服务端二进制构建 ──────────────────────────────────────
  build-server:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rtb-linux-x64
          - os: ubuntu-24.04-arm
            artifact: rtb-linux-arm64
          - os: macos-latest
            artifact: rtb-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build binary (esbuild + Node.js SEA)
        run: node build-binary.mjs

      - name: Smoke test
        run: ./release/rtb config || true

      - name: Package
        run: |
          cd release
          cp ../node_modules/node-pty/build/Release/pty.node . 2>/dev/null || true
          tar czf ${{ matrix.artifact }}.tar.gz rtb pty.node 2>/dev/null || tar czf ${{ matrix.artifact }}.tar.gz rtb
          ls -lh ${{ matrix.artifact }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

  # ── Android APK 构建 ─────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Generate native project
        run: cd mobile && npx expo prebuild --platform android --clean

      - name: Build Release APK
        run: |
          cd mobile/android
          ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p release
          cp mobile/android/app/build/outputs/apk/release/app-release.apk release/rtb-mobile.apk
          ls -lh release/rtb-mobile.apk

      - uses: actions/upload-artifact@v4
        with:
          name: rtb-mobile-android
          path: release/rtb-mobile.apk

  # ── 发布到 GitHub Releases ───────────────────────────────
  release:
    needs: [build-server, build-android]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RTB ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.apk
