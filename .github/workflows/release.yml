name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: rtb-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: rtb-linux-arm64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: rtb-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Build frontend
        run: cd web && npm ci && npm run build
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} -p rtb-cli
      - name: Package
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/rtb-cli release/${{ matrix.name }}
          cd release && tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}
      - uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.name }}.tar.gz
